<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360° Frame Adjuster — autopos ONE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-bg:      #0d1f2d;
      --c-surface: #122030;
      --c-border:  rgba(106,204,172,0.18);
      --c-accent:  #6ACCAC;
      --c-text:    rgba(255,255,255,0.88);
      --c-muted:   rgba(255,255,255,0.52);
    }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 40px;
      gap: 20px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--c-accent);
    }

    /* ── Top bar ── */
    .topbar {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .frame-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--c-text);
      min-width: 90px;
      text-align: center;
    }

    button {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      color: var(--c-text);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      white-space: nowrap;
    }
    button:hover { border-color: var(--c-accent); background: rgba(106,204,172,0.08); }
    button.primary { background: var(--c-accent); color: #0d1f2d; border-color: var(--c-accent); font-weight: 700; }
    button.primary:hover { background: #4ab89a; border-color: #4ab89a; }
    button.danger { border-color: rgba(255,107,107,0.4); color: rgba(255,107,107,0.8); }
    button.danger:hover { border-color: #ff6b6b; background: rgba(255,107,107,0.08); color: #ff6b6b; }

    /* ── Viewer ── */
    #viewer-wrap {
      width: 100%;
      max-width: 860px;
      position: relative;
    }

    #viewer {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }

    #viewer.grabbing { cursor: grabbing; }

    .frame {
      position: absolute;
      top: 4%; left: 4%;
      width: 92%; height: 92%;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
      opacity: 0;
      transform-origin: center center;
    }

    .frame.active { opacity: 1; }

    /* crosshair overlay */
    #crosshair {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 16px;
      overflow: hidden;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(106,204,172,0.15);
    }
    #crosshair::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
    #crosshair::after  { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }

    /* hint in viewer */
    .viewer-hint {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-size: 11px;
      color: var(--c-muted);
      pointer-events: none;
      line-height: 1.7;
      text-align: right;
    }

    /* ── Info bar ── */
    .info-bar {
      width: 100%;
      max-width: 860px;
      display: flex;
      gap: 0;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 12px;
      overflow: hidden;
    }

    .info-cell {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 8px;
      border-right: 1px solid var(--c-border);
      gap: 4px;
    }
    .info-cell:last-child { border-right: none; }

    .info-label {
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--c-muted);
    }
    .info-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--c-accent);
      font-variant-numeric: tabular-nums;
    }

    /* ── Frame strip ── */
    .strip-wrap {
      width: 100%;
      max-width: 860px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .strip {
      display: flex;
      gap: 8px;
      min-width: max-content;
    }
    .strip-thumb {
      width: 60px;
      height: 45px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: border-color .15s;
    }
    .strip-thumb:hover { border-color: rgba(106,204,172,0.5); }
    .strip-thumb.active { border-color: var(--c-accent); }
    .strip-thumb img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }
    .strip-thumb .thumb-num {
      position: absolute;
      bottom: 2px; right: 4px;
      font-size: 9px;
      color: var(--c-muted);
      font-weight: 600;
    }
    .strip-thumb.modified::after {
      content: '●';
      position: absolute;
      top: 2px; left: 4px;
      font-size: 8px;
      color: var(--c-accent);
    }

    /* ── Config output ── */
    .config-section {
      width: 100%;
      max-width: 860px;
    }
    .config-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .config-label {
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--c-muted);
    }
    pre#config-out {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--c-text);
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
    }

    /* ── Instructions ── */
    .instructions {
      width: 100%;
      max-width: 860px;
      font-size: 12px;
      color: var(--c-muted);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px 20px;
    }
    .instructions span { display: flex; gap: 6px; align-items: center; }
    .kbd {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--c-border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-family: monospace;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <h1>360° Frame Adjuster · autopos ONE</h1>
    <div class="nav-group">
      <button id="btn-prev">← Prev</button>
      <span class="frame-label" id="frame-label">Frame 01 / 12</span>
      <button id="btn-next">Next →</button>
    </div>
    <div class="nav-group">
      <button id="btn-reset" class="danger">Reset Frame</button>
      <button id="btn-reset-all" class="danger">Reset All</button>
      <button id="btn-copy" class="primary">Copy Config</button>
    </div>
  </div>

  <!-- Viewer -->
  <div id="viewer-wrap">
    <div id="viewer"></div>
    <div id="crosshair"></div>
    <div class="viewer-hint">Drag to move<br>Scroll to scale</div>
  </div>

  <!-- Info bar -->
  <div class="info-bar">
    <div class="info-cell">
      <span class="info-label">Frame</span>
      <span class="info-value" id="info-frame">01</span>
    </div>
    <div class="info-cell">
      <span class="info-label">X offset</span>
      <span class="info-value" id="info-x">0.0%</span>
    </div>
    <div class="info-cell">
      <span class="info-label">Y offset</span>
      <span class="info-value" id="info-y">0.0%</span>
    </div>
    <div class="info-cell">
      <span class="info-label">Scale</span>
      <span class="info-value" id="info-scale">1.000</span>
    </div>
  </div>

  <!-- Thumbnail strip -->
  <div class="strip-wrap">
    <div class="strip" id="strip"></div>
  </div>

  <!-- Instructions -->
  <div class="instructions">
    <span><kbd class="kbd">Drag</kbd> Move frame</span>
    <span><kbd class="kbd">Scroll</kbd> Scale ±0.01</span>
    <span><kbd class="kbd">← → ↑ ↓</kbd> Nudge 0.2%</span>
    <span><kbd class="kbd">Shift + arrows</kbd> Nudge 1%</span>
    <span><kbd class="kbd">+ / −</kbd> Scale ±0.01</span>
    <span><kbd class="kbd">[ / ]</kbd> Prev / Next frame</span>
  </div>

  <!-- Config output -->
  <div class="config-section">
    <div class="config-header">
      <span class="config-label">Config — paste into index.html</span>
    </div>
    <pre id="config-out"></pre>
  </div>

  <script>
    var TOTAL      = 12;
    var STORE_KEY  = 'ap_one_frame_config';

    /* ── Config helpers ── */
    function defaultConfig() {
      return Array.from({ length: TOTAL }, function () {
        return { scale: 1.000, x: 0.0, y: 0.0 };
      });
    }

    function loadConfig() {
      try {
        var raw = localStorage.getItem(STORE_KEY);
        if (raw) {
          var p = JSON.parse(raw);
          if (Array.isArray(p) && p.length === TOTAL) return p;
        }
      } catch (e) {}
      return defaultConfig();
    }

    function saveConfig() {
      localStorage.setItem(STORE_KEY, JSON.stringify(cfg));
      renderOutput();
      updateStrip();
    }

    var cfg = loadConfig();
    var current = 0;

    /* ── Build viewer frames ── */
    var viewer  = document.getElementById('viewer');
    var frames  = [];
    for (var i = 0; i < TOTAL; i++) {
      var n   = i + 1;
      var src = 'assets/demo/autoposone_demo_' + (n < 10 ? '0' + n : n) + '.png';
      var img = document.createElement('img');
      img.src       = src;
      img.className = 'frame' + (i === 0 ? ' active' : '');
      img.draggable = false;
      viewer.appendChild(img);
      frames.push(img);
    }

    /* ── Build thumbnail strip ── */
    var strip  = document.getElementById('strip');
    var thumbs = [];
    for (var j = 0; j < TOTAL; j++) {
      (function (idx) {
        var th   = document.createElement('div');
        th.className = 'strip-thumb' + (idx === 0 ? ' active' : '');
        var tImg = document.createElement('img');
        tImg.src       = frames[idx].src;
        tImg.draggable = false;
        var num  = document.createElement('span');
        num.className   = 'thumb-num';
        num.textContent = (idx + 1 < 10 ? '0' : '') + (idx + 1);
        th.appendChild(tImg);
        th.appendChild(num);
        th.addEventListener('click', function () { goTo(idx); });
        strip.appendChild(th);
        thumbs.push(th);
      }(j));
    }

    /* ── Apply transform ── */
    function applyTransform(idx) {
      var c = cfg[idx];
      frames[idx].style.transform =
        'translate(' + c.x.toFixed(1) + '%, ' + c.y.toFixed(1) + '%) scale(' + c.scale.toFixed(3) + ')';
    }

    function applyAll() {
      for (var k = 0; k < TOTAL; k++) applyTransform(k);
    }

    /* ── Navigation ── */
    function goTo(idx) {
      thumbs[current].classList.remove('active');
      frames[current].classList.remove('active');
      current = ((idx % TOTAL) + TOTAL) % TOTAL;
      frames[current].classList.add('active');
      thumbs[current].classList.add('active');
      thumbs[current].scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
      updateInfo();
    }

    document.getElementById('btn-prev').addEventListener('click', function () { goTo(current - 1); });
    document.getElementById('btn-next').addEventListener('click', function () { goTo(current + 1); });

    document.getElementById('btn-reset').addEventListener('click', function () {
      cfg[current] = { scale: 1.000, x: 0.0, y: 0.0 };
      applyTransform(current);
      updateInfo();
      saveConfig();
    });

    document.getElementById('btn-reset-all').addEventListener('click', function () {
      if (!confirm('Reset all 12 frames to default?')) return;
      cfg = defaultConfig();
      applyAll();
      updateInfo();
      saveConfig();
    });

    document.getElementById('btn-copy').addEventListener('click', function () {
      var text = document.getElementById('config-out').textContent;
      navigator.clipboard.writeText(text).then(function () {
        var btn = document.getElementById('btn-copy');
        btn.textContent = '✓ Copied!';
        setTimeout(function () { btn.textContent = 'Copy Config'; }, 1800);
      });
    });

    /* ── Drag to reposition ── */
    var dragging = false, dStartX, dStartY, dBaseX, dBaseY;

    viewer.addEventListener('mousedown', function (e) {
      e.preventDefault();
      dragging = true;
      dStartX  = e.clientX;
      dStartY  = e.clientY;
      dBaseX   = cfg[current].x;
      dBaseY   = cfg[current].y;
      viewer.classList.add('grabbing');
    });

    document.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      var vw = viewer.offsetWidth;
      var vh = viewer.offsetHeight;
      cfg[current].x = parseFloat((dBaseX + (e.clientX - dStartX) / vw * 100).toFixed(1));
      cfg[current].y = parseFloat((dBaseY + (e.clientY - dStartY) / vh * 100).toFixed(1));
      applyTransform(current);
      updateInfo();
    });

    document.addEventListener('mouseup', function () {
      if (!dragging) return;
      dragging = false;
      viewer.classList.remove('grabbing');
      saveConfig();
    });

    /* ── Scroll to scale ── */
    viewer.addEventListener('wheel', function (e) {
      e.preventDefault();
      var delta = e.deltaY > 0 ? -0.01 : 0.01;
      cfg[current].scale = parseFloat(
        Math.max(0.3, Math.min(3.0, cfg[current].scale + delta)).toFixed(3)
      );
      applyTransform(current);
      updateInfo();
      saveConfig();
    }, { passive: false });

    /* ── Keyboard shortcuts ── */
    document.addEventListener('keydown', function (e) {
      var tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;

      var nudge = e.shiftKey ? 1.0 : 0.2;
      var handled = true;

      switch (e.key) {
        case 'ArrowLeft':  cfg[current].x -= nudge; break;
        case 'ArrowRight': cfg[current].x += nudge; break;
        case 'ArrowUp':    cfg[current].y -= nudge; break;
        case 'ArrowDown':  cfg[current].y += nudge; break;
        case '+': case '=':
          cfg[current].scale = parseFloat(Math.min(3.0, cfg[current].scale + 0.01).toFixed(3)); break;
        case '-':
          cfg[current].scale = parseFloat(Math.max(0.3, cfg[current].scale - 0.01).toFixed(3)); break;
        case '[': goTo(current - 1); return;
        case ']': goTo(current + 1); return;
        default: handled = false;
      }

      if (!handled) return;
      e.preventDefault();
      cfg[current].x = parseFloat(cfg[current].x.toFixed(1));
      cfg[current].y = parseFloat(cfg[current].y.toFixed(1));
      applyTransform(current);
      updateInfo();
      saveConfig();
    });

    /* ── UI updates ── */
    function updateInfo() {
      var c   = cfg[current];
      var num = current + 1;
      document.getElementById('frame-label').textContent =
        'Frame ' + (num < 10 ? '0' + num : num) + ' / ' + TOTAL;
      document.getElementById('info-frame').textContent =
        (num < 10 ? '0' + num : num);
      document.getElementById('info-x').textContent     = c.x.toFixed(1) + '%';
      document.getElementById('info-y').textContent     = c.y.toFixed(1) + '%';
      document.getElementById('info-scale').textContent = c.scale.toFixed(3);
    }

    function updateStrip() {
      for (var i = 0; i < TOTAL; i++) {
        var c = cfg[i];
        var modified = c.scale !== 1.000 || c.x !== 0.0 || c.y !== 0.0;
        thumbs[i].classList.toggle('modified', modified);
      }
    }

    function pad(val, len) {
      var s = val.toFixed(1);
      while (s.length < len) s = ' ' + s;
      return s;
    }

    function renderOutput() {
      var lines = cfg.map(function (c, i) {
        var n = i + 1;
        return '  { scale: ' + c.scale.toFixed(3) +
               ', x: ' + pad(c.x, 5) +
               ', y: ' + pad(c.y, 5) + ' }' +
               (i < TOTAL - 1 ? ',' : ' ') +
               '  // ' + (n < 10 ? '0' + n : n);
      });
      document.getElementById('config-out').textContent =
        'var AP_ONE_FRAME_CONFIG = [\n' + lines.join('\n') + '\n];';
    }

    /* ── Init ── */
    applyAll();
    updateInfo();
    updateStrip();
    renderOutput();
  </script>
</body>
</html>
