<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360° Frame Adjuster — autopos ONE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-bg:      #0d1f2d;
      --c-surface: #122030;
      --c-border:  rgba(106,204,172,0.18);
      --c-accent:  #6ACCAC;
      --c-text:    rgba(255,255,255,0.88);
      --c-muted:   rgba(255,255,255,0.52);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
      gap: 12px;
    }

    h1 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--c-accent);
    }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    button {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      color: var(--c-text);
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      white-space: nowrap;
    }
    button:hover { border-color: var(--c-accent); background: rgba(106,204,172,0.08); }
    button.primary { background: var(--c-accent); color: #0d1f2d; border-color: var(--c-accent); font-weight: 700; }
    button.primary:hover { background: #4ab89a; border-color: #4ab89a; }
    button.danger { border-color: rgba(255,100,100,0.35); color: rgba(255,120,120,0.8); }
    button.danger:hover { border-color: #ff6b6b; background: rgba(255,107,107,0.08); color: #ff6b6b; }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Viewer column ── */
    .viewer-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 12px;
      min-width: 0;
      justify-content: flex-start;
    }

    #viewer {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .frame {
      position: absolute;
      top: 4%; left: 4%;
      width: 92%; height: 92%;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
      opacity: 0;
      transform-origin: center center;
    }
    .frame.active { opacity: 1; }

    .crosshair {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .crosshair::before, .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(106,204,172,0.13);
    }
    .crosshair::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
    .crosshair::after  { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }

    .viewer-hint {
      font-size: 11px;
      color: var(--c-muted);
      line-height: 1.6;
    }
    .viewer-hint kbd {
      display: inline-block;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--c-border);
      border-radius: 4px;
      padding: 0 5px;
      font-size: 10px;
      font-family: monospace;
    }

    /* ── Panel column ── */
    .panel-col {
      width: 330px;
      flex-shrink: 0;
      border-left: 1px solid var(--c-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-heading {
      padding: 9px 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--c-muted);
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
    }

    .panel {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: rgba(106,204,172,0.25); border-radius: 2px; }

    /* ── Panel row ── */
    .panel-row {
      border: 1px solid var(--c-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--c-surface);
      transition: border-color .15s;
    }
    .panel-row:hover { border-color: rgba(106,204,172,0.38); }
    .panel-row.active { border-color: var(--c-accent); }

    .row-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
    }
    .panel-row.active .row-header {
      background: rgba(106,204,172,0.07);
      border-bottom: 1px solid var(--c-border);
    }

    .row-thumb {
      width: 54px;
      height: 40px;
      object-fit: contain;
      border-radius: 5px;
      background: rgba(0,0,0,0.35);
      flex-shrink: 0;
      display: block;
    }

    .row-meta { flex: 1; min-width: 0; }

    .row-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--c-text);
    }

    .row-summary {
      font-size: 10px;
      color: var(--c-muted);
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .row-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--c-accent);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity .2s;
    }
    .panel-row.modified .row-dot { opacity: 1; }

    /* ── Sliders (shown when row is active) ── */
    .row-controls {
      display: none;
      flex-direction: column;
      gap: 6px;
      padding: 10px 10px 12px;
    }
    .panel-row.active .row-controls { display: flex; }

    .ctrl-row {
      display: grid;
      grid-template-columns: 18px 1fr 50px;
      align-items: center;
      gap: 8px;
    }

    .ctrl-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--c-muted);
      text-align: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: rgba(106,204,172,0.2);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--c-accent);
      cursor: pointer;
      border: 2px solid var(--c-bg);
      box-shadow: 0 0 0 1px rgba(106,204,172,0.4);
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--c-accent);
      cursor: pointer;
      border: 2px solid var(--c-bg);
    }

    .ctrl-val {
      font-size: 11px;
      color: var(--c-text);
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Fira Code', monospace;
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>360° Frame Adjuster · autopos ONE</h1>
    <div class="header-actions">
      <button id="btn-reset" class="danger">Reset Frame</button>
      <button id="btn-reset-all" class="danger">Reset All</button>
      <button id="btn-copy" class="primary">Copy Config</button>
    </div>
  </div>

  <div class="layout">

    <!-- Viewer -->
    <div class="viewer-col">
      <div id="viewer">
        <div class="crosshair"></div>
      </div>
      <div class="viewer-hint">
        <kbd>← → ↑ ↓</kbd> nudge 0.2% &nbsp;·&nbsp;
        <kbd>Shift</kbd>+arrows nudge 1% &nbsp;·&nbsp;
        <kbd>+ −</kbd> scale &nbsp;·&nbsp;
        <kbd>[ ]</kbd> prev / next frame
      </div>
    </div>

    <!-- Panel -->
    <div class="panel-col">
      <div class="panel-heading">Frames — X · Y · Scale</div>
      <div class="panel" id="panel"></div>
    </div>

  </div>

  <script>
    var TOTAL     = 12;
    var STORE_KEY = 'ap_one_frame_config';

    function defaultConfig() {
      return Array.from({ length: TOTAL }, function () {
        return { scale: 1.000, x: 0.0, y: 0.0 };
      });
    }

    function loadConfig() {
      try {
        var raw = localStorage.getItem(STORE_KEY);
        if (raw) {
          var p = JSON.parse(raw);
          if (Array.isArray(p) && p.length === TOTAL) return p;
        }
      } catch (e) {}
      return defaultConfig();
    }

    function saveConfig() {
      localStorage.setItem(STORE_KEY, JSON.stringify(cfg));
    }

    var cfg     = loadConfig();
    var current = 0;
    var frames  = [];
    var rows    = [];

    /* ── Build viewer frames ── */
    var viewer = document.getElementById('viewer');
    for (var i = 0; i < TOTAL; i++) {
      var n   = i + 1;
      var src = 'assets/demo/autoposone_demo_' + (n < 10 ? '0' + n : n) + '.png';
      var img = document.createElement('img');
      img.src       = src;
      img.className = 'frame' + (i === 0 ? ' active' : '');
      img.draggable = false;
      viewer.appendChild(img);
      frames.push(img);
    }

    /* ── Apply transform to one frame ── */
    function applyTransform(idx) {
      var c = cfg[idx];
      frames[idx].style.transform =
        'translate(' + c.x.toFixed(1) + '%, ' + c.y.toFixed(1) + '%) scale(' + c.scale.toFixed(3) + ')';
    }

    function applyAll() {
      for (var k = 0; k < TOTAL; k++) applyTransform(k);
    }

    /* ── Navigate to frame ── */
    function goTo(idx) {
      rows[current].classList.remove('active');
      frames[current].classList.remove('active');
      current = ((idx % TOTAL) + TOTAL) % TOTAL;
      frames[current].classList.add('active');
      rows[current].classList.add('active');
      rows[current].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    /* ── Sync row UI to cfg[idx] ── */
    function syncRow(idx) {
      var c   = cfg[idx];
      var row = rows[idx];
      row.querySelector('.row-summary').textContent =
        'X ' + (c.x >= 0 ? ' ' : '') + c.x.toFixed(1) +
        '  Y ' + (c.y >= 0 ? ' ' : '') + c.y.toFixed(1) +
        '  S ' + c.scale.toFixed(3);
      row.classList.toggle('modified', c.scale !== 1.000 || c.x !== 0.0 || c.y !== 0.0);
      row.querySelector('.slider-x').value     = c.x;
      row.querySelector('.slider-y').value     = c.y;
      row.querySelector('.slider-s').value     = c.scale;
      row.querySelector('.val-x').textContent  = (c.x >= 0 ? ' ' : '') + c.x.toFixed(1);
      row.querySelector('.val-y').textContent  = (c.y >= 0 ? ' ' : '') + c.y.toFixed(1);
      row.querySelector('.val-s').textContent  = c.scale.toFixed(3);
    }

    /* ── Config text for clipboard ── */
    function pad(val, len) {
      var s = val.toFixed(1);
      while (s.length < len) s = ' ' + s;
      return s;
    }

    function getConfigText() {
      var lines = cfg.map(function (c, i) {
        var n = i + 1;
        return '  { scale: ' + c.scale.toFixed(3) +
               ', x: ' + pad(c.x, 5) +
               ', y: ' + pad(c.y, 5) + ' }' +
               (i < TOTAL - 1 ? ',' : ' ') +
               '  // ' + (n < 10 ? '0' + n : n);
      });
      return 'var AP_ONE_FRAME_CONFIG = [\n' + lines.join('\n') + '\n];';
    }

    /* ── Build panel rows ── */
    var panel = document.getElementById('panel');

    for (var j = 0; j < TOTAL; j++) {
      (function (idx) {
        var n   = idx + 1;
        var pad2 = n < 10 ? '0' + n : '' + n;
        var c   = cfg[idx];
        var row = document.createElement('div');
        row.className = 'panel-row' + (idx === 0 ? ' active' : '');

        row.innerHTML =
          '<div class="row-header">' +
            '<img class="row-thumb" src="assets/demo/autoposone_demo_' + pad2 + '.png" draggable="false" alt="">' +
            '<div class="row-meta">' +
              '<div class="row-num">Frame ' + pad2 + '</div>' +
              '<div class="row-summary">X  ' + c.x.toFixed(1) + '  Y  ' + c.y.toFixed(1) + '  S ' + c.scale.toFixed(3) + '</div>' +
            '</div>' +
            '<div class="row-dot"></div>' +
          '</div>' +
          '<div class="row-controls">' +
            '<div class="ctrl-row">' +
              '<span class="ctrl-label">X</span>' +
              '<input type="range" class="slider-x" min="-20" max="20" step="0.1" value="' + c.x + '">' +
              '<span class="ctrl-val val-x"> ' + c.x.toFixed(1) + '</span>' +
            '</div>' +
            '<div class="ctrl-row">' +
              '<span class="ctrl-label">Y</span>' +
              '<input type="range" class="slider-y" min="-20" max="20" step="0.1" value="' + c.y + '">' +
              '<span class="ctrl-val val-y"> ' + c.y.toFixed(1) + '</span>' +
            '</div>' +
            '<div class="ctrl-row">' +
              '<span class="ctrl-label">S</span>' +
              '<input type="range" class="slider-s" min="0.5" max="2.0" step="0.001" value="' + c.scale + '">' +
              '<span class="ctrl-val val-s">' + c.scale.toFixed(3) + '</span>' +
            '</div>' +
          '</div>';

        row.querySelector('.row-header').addEventListener('click', function () { goTo(idx); });

        function makeSliderHandler(prop, decimals) {
          return function (e) {
            cfg[idx][prop] = parseFloat(parseFloat(e.target.value).toFixed(decimals));
            applyTransform(idx);
            syncRow(idx);
            saveConfig();
          };
        }

        row.querySelector('.slider-x').addEventListener('input', makeSliderHandler('x', 1));
        row.querySelector('.slider-y').addEventListener('input', makeSliderHandler('y', 1));
        row.querySelector('.slider-s').addEventListener('input', makeSliderHandler('scale', 3));

        panel.appendChild(row);
        rows.push(row);
      }(j));
    }

    /* ── Header buttons ── */
    document.getElementById('btn-reset').addEventListener('click', function () {
      cfg[current] = { scale: 1.000, x: 0.0, y: 0.0 };
      applyTransform(current);
      syncRow(current);
      saveConfig();
    });

    document.getElementById('btn-reset-all').addEventListener('click', function () {
      if (!confirm('Reset all 12 frames to default?')) return;
      cfg = defaultConfig();
      applyAll();
      for (var k = 0; k < TOTAL; k++) syncRow(k);
      saveConfig();
    });

    document.getElementById('btn-copy').addEventListener('click', function () {
      navigator.clipboard.writeText(getConfigText()).then(function () {
        var btn = document.getElementById('btn-copy');
        btn.textContent = '✓ Copied!';
        setTimeout(function () { btn.textContent = 'Copy Config'; }, 1800);
      });
    });

    /* ── Keyboard shortcuts (when no input is focused) ── */
    document.addEventListener('keydown', function (e) {
      if (e.target.tagName === 'INPUT') return;
      var nudge   = e.shiftKey ? 1.0 : 0.2;
      var handled = true;

      switch (e.key) {
        case 'ArrowLeft':  cfg[current].x = parseFloat((cfg[current].x - nudge).toFixed(1)); break;
        case 'ArrowRight': cfg[current].x = parseFloat((cfg[current].x + nudge).toFixed(1)); break;
        case 'ArrowUp':    cfg[current].y = parseFloat((cfg[current].y - nudge).toFixed(1)); break;
        case 'ArrowDown':  cfg[current].y = parseFloat((cfg[current].y + nudge).toFixed(1)); break;
        case '+': case '=':
          cfg[current].scale = parseFloat(Math.min(2.0, cfg[current].scale + 0.01).toFixed(3)); break;
        case '-':
          cfg[current].scale = parseFloat(Math.max(0.5, cfg[current].scale - 0.01).toFixed(3)); break;
        case '[': goTo(current - 1); return;
        case ']': goTo(current + 1); return;
        default: handled = false;
      }

      if (!handled) return;
      e.preventDefault();
      applyTransform(current);
      syncRow(current);
      saveConfig();
    });

    /* ── Init ── */
    applyAll();
  </script>
</body>
</html>
